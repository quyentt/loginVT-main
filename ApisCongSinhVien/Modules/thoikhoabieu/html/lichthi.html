<div class="one-door study-space">
    <div class="overlay"></div>
    <div class="content-tab no-tab">
        <p class="link">
            <a href="#">Thời khóa biểu</a><i class="fal fa-angle-right"></i>
            <a href="#">Lịch thi</a>
        </p>
    </div>

    <div class="row register-school my-calendar aps-lichthi">
        <div class="col-12">
            <div class="box-shadow">
                <div class="top-gray">
                    <div class="top-gray-wrapper" style="border-bottom: 1px solid #e1e1e1;">
                        <div class="form-group-list d-flex col-12 col-md-6">
                            <div class="form-group">
                                <label for="">Học kỳ</label>
                                <div class="form-item d-flex  form-add-info">

                                    <div class="input-group no-icon">

                                        <select class="form-select select-opt" aria-label="Default select example"
                                            id="dropSearch_HocKy"></select>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="">Học phần</label>
                                <div class="form-item d-flex  form-add-info">
                                    <div class="input-group no-icon">
                                        <select class="form-select select-opt" aria-label="Default select example"
                                            id="dropSearch_HocPhan"></select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="form-group-btn col-12 col-md-6 aps-gap-10">
                            <button class="btn btn-default btn-search" id="btnXemLich"><i
                                    class="far fa-search mr-5"></i> Xem lịch</button>
                            <button class="btn btn-danger" id="btnXemLichSu"><i
                                    class="far fa-file-search mr-5"></i>Xem lịch
                                sử</button>
                        </div>
                    </div>
                </div>
                <div class="p-3">
                    <p class="fs-18 mb-0 mt-3 aps-text-lable">Lịch thi cá nhân</p>
                    <div class="aps-table-select scroll-table-x">
                        <table
                            class="calendar-modal-table table transcrip-table tabs-scores table-noborder tblLichThiCaNhan mt-5"
                            id="tblLichThiCaNhan">
                            <thead>
                                <tr>
                                    <th class="text-center w-50px" scope="col">STT</th>
                                    <th scope="col">Mã học phần</th>
                                    <th scope="col">Tên học phần</th>
                                    <th scope="col" class="text-center">Lần thi</th>
                                    <th scope="col">Ngày thi</th>
                                    <th class="col" scope="col">Thời gian thi</th>
                                    <th scope="col">Hình thức</th>
                                    <th class="col" scope="col">Phòng thi</th>
                                    <th scope="col" class="text-center">Số báo danh</th>
                                    <th scope="col">Thông tin sinh viên ( Họ tên, mã số)</th>
                                </tr>
                            </thead>
                            <tbody>

                            </tbody>
                        </table>
                    </div>
                    <p class="fs-18 aps-text-lable mt-20 mb-0" id="lblLichThiChung">Kế hoạch thi chung</p>
                    <div class="aps-table-select scroll-table-x">
                        <table
                            class="calendar-modal-table table transcrip-table tabs-scores table-noborder tblLichThiChung mt-5"
                            id="tblLichThiChung">
                            <thead>
                                <tr>
                                    <th class="text-center w-50px" scope="col">STT</th>
                                    <th scope="col">Mã học phần</th>
                                    <th scope="col">Tên học phần</th>
                                    <th scope="col">Ngày thi</th>
                                    <th class="col" scope="col">Thời gian thi</th>
                                    <th scope="col">Hình thức</th>
                                    <th class="col" scope="col">Phòng thi</th>
                                    <th scope="col">Số báo danh</th>
                                </tr>
                            </thead>
                            <tbody>



                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
