<style>
    /* Compact Layout Styles */
    .one-door.study-space {
        padding: 0;
        margin: 0;
    }

    .content-tab.no-tab {
        margin-bottom: 10px;
    }

    .box-shadow {
        padding: 15px;
        margin-bottom: 15px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* Search Bar Section */
    .search-bar-section {
        padding: 20px;
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .search-bar-header .title-text {
        font-size: 18px;
        font-weight: 600;
        color: #223771;
        margin-bottom: 5px;
    }

    .search-bar-subtitle {
        font-size: 12px;
        color: #666;
        margin: 0;
        font-style: italic;
    }

    .search-bar-info {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 15px;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        border-radius: 6px;
        border-left: 3px solid #223771;
    }

    .info-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: #555;
    }

    .info-item i {
        font-size: 16px;
        color: #223771;
        width: 20px;
        text-align: center;
    }

    .search-bar-controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 10px;
        padding-top: 15px;
        border-top: 2px solid #e9ecef;
    }

    .search-bar-controls .form-control,
    .search-bar-controls .form-select {
        width: 100%;
        font-size: 14px;
        min-height: 38px;
        padding: 8px 12px;
    }

    .search-bar-controls .btn {
        width: 100%;
        white-space: nowrap;
        min-height: 38px;
        padding: 10px 16px;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 500;
    }

    .search-bar-controls .btn i {
        margin-right: 8px;
    }

    /* Calendar Compact */
    .calendar-compact {
        background: white;
        height: 100%;
        display: flex;
        flex-direction: column;
        border-radius: 12px;
        overflow: hidden;
    }

    .calendar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 15px;
        background: linear-gradient(135deg, #223771 0%, #3c5398 100%);
        color: white;
    }

    .calendar-title {
        font-size: 16px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .calendar-header .btn {
        color: white;
        border-color: rgba(255,255,255,0.3);
        padding: 5px 10px;
        font-size: 13px;
    }

    .calendar-header .btn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: white;
    }

    .calendar-body {
        padding: 15px;
        flex: 1;
    }

    .weekdays-compact {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        list-style: none;
        padding: 0;
        margin: 0 0 8px 0;
        gap: 4px;
    }

    .weekdays-compact li {
        text-align: center;
        font-weight: 600;
        font-size: 12px;
        padding: 6px 2px;
        color: #666;
        background: #f8f9fa;
        border-radius: 4px;
    }

    .calendar-body .days {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        list-style: none;
        padding: 0;
        margin: 0;
        gap: 4px;
    }

    .calendar-body .days li {
        text-align: center;
        padding: 8px 4px;
        font-size: 13px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.2s;
        background: #f8f9fa;
        border: 1px solid transparent;
    }

    .calendar-body .days li.poiter {
        background: white;
        border-color: #e1e1e1;
    }

    .calendar-body .days li.poiter:hover {
        background: #e3f2fd;
        border-color: #2196f3;
        transform: translateY(-1px);
        box-shadow: 0 2px 6px rgba(33, 150, 243, 0.3);
    }

    .calendar-body .days li.active {
        background: var(--orange, #ff6b35) !important;
        color: white !important;
        font-weight: bold;
        border-color: var(--orange, #ff6b35) !important;
        box-shadow: 0 3px 8px rgba(255, 107, 53, 0.4);
    }

    .calendar-body .days li.day-of-other-month {
        color: #ccc;
        cursor: default;
        background: transparent;
    }

    /* Table Styles */
    .table-container {
        overflow-x: auto;
        overflow-y: auto;
        max-height: calc(100vh - 300px);
        position: relative;
    }

    #tblPhanQuyenDuLieu {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 13px;
    }

    #tblPhanQuyenDuLieu thead th {
        background: linear-gradient(135deg, #223771 0%, #3c5398 100%);
        color: white;
        padding: 12px 8px;
        font-weight: 600;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 10;
        border: 1px solid #1a2a54;
        white-space: nowrap;
        min-width: 120px;
    }

    #tblPhanQuyenDuLieu thead th:first-child {
        min-width: 150px;
        left: 0;
        z-index: 11;
    }

    #tblPhanQuyenDuLieu tbody td {
        padding: 10px 8px;
        border: 1px solid #e0e0e0;
        background: white;
        vertical-align: middle;
    }

    #tblPhanQuyenDuLieu tbody td:first-child {
        position: sticky;
        left: 0;
        background: #f8f9fa;
        font-weight: 500;
        z-index: 5;
    }

    #tblPhanQuyenDuLieu tbody tr:hover td {
        background: #f0f7ff;
    }

    .td-center {
        text-align: center !important;
    }

    /* Checkbox Styles */
    input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
    }

    input[type="checkbox"]:hover {
        transform: scale(1.1);
    }

    /* Responsive */
    @media (max-width: 992px) {
        .search-bar-section {
            padding: 15px;
        }

        #tblPhanQuyenDuLieu {
            font-size: 12px;
        }

        #tblPhanQuyenDuLieu thead th,
        #tblPhanQuyenDuLieu tbody td {
            padding: 8px 6px;
            min-width: 100px;
        }
    }

    @media (max-width: 768px) {
        .calendar-body .days li {
            font-size: 12px;
            padding: 6px 2px;
        }

        .weekdays-compact li {
            font-size: 11px;
            padding: 5px 1px;
        }
    }
</style>
