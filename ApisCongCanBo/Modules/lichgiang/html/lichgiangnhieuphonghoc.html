<div class="modal fade" id="modal_export_excel" tabindex="-1" aria-labelledby="exportExcelLabel" aria-hidden="true">

        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title" id="exportExcelLabel">

                    </label>

                        <option value="current_week">Tuần hiện tại đang xem</option>
                        <option value="custom_date">Chọn ngày cụ thể</option>
                        <option value="custom_range">Chọn khoảng thời gian</option>
                    </select>
                </div>
