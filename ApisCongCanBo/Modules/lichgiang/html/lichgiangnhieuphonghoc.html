<style>
    .schedule-grid-container {
        overflow-x: auto;
        overflow-y: auto;
        max-height: calc(100vh - 200px);
        position: relative;
    }

    .schedule-grid {
        display: grid;
        grid-template-columns: 120px repeat(auto-fill, minmax(140px, 1fr));
        border: 1px solid #ddd;
        background: white;
        min-width: 100%;
    }

    .schedule-header {
        background-color: #f8f9fa;
        border: 1px solid #ddd;
        padding: 8px;
        font-weight: bold;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 10;
    }

    .schedule-room-header {
        background-color: #f8f9fa;
        border: 1px solid #ddd;
        padding: 8px;
        font-weight: bold;
        position: sticky;
        left: 0;
        z-index: 5;
        background: white;
    }

    .schedule-cell {
        border: 1px solid #e0e0e0;
        min-height: 60px;
        position: relative;
        background: white;
    }

    .schedule-cell.room-name {
        position: sticky;
        left: 0;
        background: #f8f9fa;
        z-index: 5;
        font-weight: 500;
        display: flex;
        align-items: center;
        padding: 8px;
    }

    .schedule-event {
        padding: 4px 6px;
        margin: 2px;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .schedule-event:hover {
        transform: scale(1.02);
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        z-index: 100;
        white-space: normal;
    }

    .schedule-event.color-1 {
        background-color: #223771;
        color: white;
    }

    .schedule-event.color-2 {
        background-color: #d49f3a;
        color: white;
    }

    .schedule-event.color-3 {
        background-color: #ec4c00;
        color: white;
    }

    .schedule-event.color-4 {
        background-color: #5a7adb;
        color: white;
    }

    .schedule-event.color-5 {
        background-color: #3c5398;
        color: white;
    }

    .event-time {
        font-size: 10px;
        opacity: 0.9;
    }

    .event-subject {
        font-weight: 600;
        margin-bottom: 2px;
    }

    .event-teacher {
        font-size: 10px;
        opacity: 0.85;
    }

    .block-calendar ul li.active span {
        background-color: var(--orange) !important;
    }

    .week-navigation {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
    }

    .week-navigation button {
        padding: 8px 16px;
    }

    .week-info {
        font-size: 18px;
        font-weight: 600;
        color: #223771;
        min-width: 300px;
        text-align: center;
    }

    @media (min-width: 992px) {
        #modal_detail .modal-lg,
        #modal_detail .modal-xl {
            max-width: 1140px;
        }
    }
</style>

<div class="one-door study-space">
    <div class="overlay"></div>
    <div class="content-tab no-tab">
        <p class="link">
            <a href="#">Lịch giảng</a><i class="fal fa-angle-right"></i>
            <a href="#">Lịch giảng nhiều phòng học</a>
        </p>
    </div>

    <div class="row register-school my-calendar">
        <div class="col-12 col-md-9 register-school-right">
            <div class="box-shadow">
                <div class="news-search-form">
                    <p class="me-auto color-dask-blue fz20 pl10" style="margin-bottom: 12px !important;">
                        <i class="fa-solid fa-calendar-users pr5 fw-bold"></i>Lịch giảng nhiều phòng học
                    </p>
                    <div class="form-group-cover">
                        <label for="dropSearch_ToaNha" class="form-label main-label pr10">Tòa nhà</label>
                        <div class="input-group no-icon" style="min-width: 300px; margin-right: 10px; margin-bottom: 12px">
                            <select class="form-select select-opt" id="dropSearch_ToaNha" aria-label="Chọn tòa nhà"></select>
                        </div>
                        <button class="btn btn-primary" id="btnSearch" style="min-width: 150px; margin-right: 10px;">
                            <i class="fa-solid fa-search mr-10 fw-bold"></i>Tìm kiếm
                        </button>
                        <button class="btn btn-outline-secondary" id="btnViewAll" style="min-width: 120px;">
                            <i class="fa-solid fa-list mr-10 fw-bold"></i>Tất cả
                        </button>
                    </div>
                </div>

                <div class="week-navigation">
                    <button class="btn btn-outline-primary" id="btnPrevWeek">
                        <i class="fal fa-chevron-left"></i> Tuần trước
                    </button>
                    <div class="week-info" id="weekInfo">Tuần 1 (01/01/2024 - 07/01/2024)</div>
                    <button class="btn btn-outline-primary" id="btnNextWeek">
                        Tuần sau <i class="fal fa-chevron-right"></i>
                    </button>
                </div>

                <div class="schedule-grid-container">
                    <div class="schedule-grid" id="scheduleGrid">
                        <!-- Grid will be generated here -->
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-3 register-school-left">
            <div class="box-shadow p-0 block-calendar mt-md-0">
                <div class="block-label top-radius bg-dask-blue">
                    <i class="fa-solid fa-calendar-range mr-5" style="margin-top: -3px !important;"></i>
                    <span id="thang"></span> - <span id="nam"></span>
                    <div class="next-prev-month month">
                        <a class="prev" style="color: white"><i class="fal fa-chevron-left me-4"></i></a>
                        <a class="next" style="color: white; padding-left: 20px"><i class="fal fa-chevron-right"></i></a>
                    </div>
                </div>
                <div class="calendar-block-cover">
                    <ul class="weekdays">
                        <li>T2</li>
                        <li>T3</li>
                        <li>T4</li>
                        <li>T5</li>
                        <li>T6</li>
                        <li>T7</li>
                        <li>Cn</li>
                    </ul>
                    <ul class="days"></ul>
                </div>
            </div>
        </div>
    </div>
</div>
