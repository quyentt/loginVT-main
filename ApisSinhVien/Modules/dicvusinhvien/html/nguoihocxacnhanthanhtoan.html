<!-- Main content -->
<section class="content MainPage aps-sinhvien" id="MainContent">
    <div class="row aps-nguoihocxacnhanthanhtoan">
        <!-- Search zone -->
        <div class="col-lg-12 box box-solid box-shadow pd0">
            <!-- Box search -->
            <div class="box box-solid box-search pd20 pb10">
                <div class="box-body pd0">
                    <div class="area-search">
                        <div id="search">
                            <div class="col-sm-6 item-search">
                                <select id="dropSearch_KeHoachXacNhan" class="select-opt"
                                    style="width:100% !important">
                                    <option value="">--Chọn kế hoạch xác nhận--</option>
                                </select>
                            </div>
                            <div class="col-sm-6 item-search aps-gap-10">
                                <a id="btnXem" class="btn btn-default btn-search">
                                    <i class="fa fa-eye"></i> <span class="lang" key="">Xem</span>
                                </a>
                            </div>
                            <div class="clear"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Thông tin kế hoạch -->
            <div class="box box-solid pd20" id="zoneThongTinKeHoach" style="display:none">

                        <i class="fa fa-info-circle"></i> <span class="lang" key="">Thông tin kế hoạch</span>
                    </h3>
                </div>
                <div class="box-body pd0 mt-10">
                    <div class="row aps-form">
                        <div class="col-sm-2"><b>Tên kế hoạch:</b></div>
                        <div class="col-sm-4"><span id="lblTenKeHoach"></span></div>
                        <div class="col-sm-2"><b>Từ ngày:</b></div>
                        <div class="col-sm-2"><span id="lblTuNgay"></span></div>
                        <div class="col-sm-2"><b>Đến ngày:</b></div>
                        <div class="clear"></div>
                    </div>
                    <div class="row aps-form mt-10">
                        <div class="col-sm-2"><b>Mô tả:</b></div>
                        <div class="col-sm-10"><span id="lblMoTa"></span></div>
                        <div class="col-sm-2"><span id="lblDenNgay"></span></div>
                        <div class="clear"></div>
                    </div>
                </div>
            </div>

            <!-- Bảng thông tin xác nhận -->
            <div class="box box-solid pd20" id="zoneXacNhan" style="display:none">
                <div class="box-header pd0">
                    <h3 class="box-title">
                        <i class="fa-solid fa-list-check"></i> <span class="lang" key="">Thông tin xác nhận</span>
                    </h3>
                    <div class="pull-right">
                        <a id="btnXacNhan" class="btn btn-primary">
                            <i class="fa-solid fa-circle-check"></i> <span class="lang" key="">Xác nhận</span>
                        </a>
                    </div>
                </div>
                <div class="box-body pd0">
                    <div class="row mt-10">
                        <div class="col-sm-12 scroll-table-x aps-table-select">
                            <table id="tblXacNhan" class="table table-hover table-bordered">
                                <thead>
                                    <tr>
                                        <th rowspan="3" class="td-center td-fixed">STT</th>
                                        <th rowspan="3" class="td-center">Loại thông tin</th>
                                        <th rowspan="3" class="td-center">Dữ liệu</th>
                                        <th colspan="4" class="td-center">Thông tin xác nhận</th>
                                        <th rowspan="3" class="td-center">
                                            Chọn<br />
                                            <input type="checkbox" id="chkSelectAll_XN" />
                                        </th>
                                    </tr>
                                    <tr>
                                        <th colspan="2" class="td-center">Cá nhân xác nhận</th>
                                        <th colspan="2" class="td-center">Nhà trường phản hồi</th>
                                    </tr>
                                    <tr>
                                        <th class="td-center">Xác nhận</th>
                                        <th class="td-center">Ghi chú theo xác nhận</th>
                                        <th class="td-center">Xác nhận</th>
                                        <th class="td-center">Ghi chú theo xác nhận</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="box-footer"></div>
            </div>
        </div>
    </div>

<!-- Modal thực hiện xác nhận -->
<div class="modal fade" id="modal_ThucHienXacNhan" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
    <div class="modal-dialog" style="width: 800px">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">
                    <span aria-hidden="true">&times;</span><span class="sr-only">Close</span>
                </button>
                <h4 class="modal-title">
                    <i class="fa-solid fa-circle-check"></i> <span class="lang" key="">Thực hiện xác nhận</span>
                </h4>
            </div>
            <div class="modal-body">
                <div class="aps-add-new pd10">
                    <div class="row aps-form">
                        <div class="col-sm-3 aps-form-label text-right"><b>Loại xác nhận:</b></div>
                        <div class="col-sm-9 aps-form-input">
                            <select id="dropSearch_LoaiXacNhan" class="select-opt"
                                style="width: 100% !important">
                                <option value="">--Chọn loại xác nhận--</option>
                            </select>
                        </div>
                        <div class="clear"></div>
                    </div>
                    <div class="row aps-form mt-10">
                        <div class="col-sm-3 aps-form-label text-right"><b>Xác nhận:</b></div>
                        <div class="col-sm-9 aps-form-input">
                            <select id="dropSearch_HanhDong" class="select-opt"
                                style="width: 100% !important">
                                <option value="">--Chọn hành động xác nhận--</option>
                            </select>
                        </div>
                        <div class="clear"></div>
                    </div>
                    <div class="row aps-form mt-10">
                        <div class="col-sm-3 aps-form-label text-right"><b>Ghi chú:</b></div>
                        <div class="col-sm-9 aps-form-input">
                            <textarea id="txtGhiChu_XN" class="form-control" rows="4"></textarea>
                        </div>
                        <div class="clear"></div>
                    </div>
                </div>
            </div>
            <div id="notify"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">
                    <i class="fa fa-times-circle"></i> <span class="lang" key="">Đóng</span>
                </button>
                <button type="button" class="btn btn-primary" id="btnXacNhan_Modal">
                    <i class="fa-solid fa-circle-check"></i> <span class="lang" key="">Xác nhận</span>
                </button>
            </div>
        </div>
    </div>
</div>
